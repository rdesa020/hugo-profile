        content: |
          Conducted blockchain and Web3 security research during a 4-week externship at Webacy, analyzing emerging technologies and competitor offerings to inform product positioning and strengthen market strategy.


      - job: "Data Science Research Intern"
        company: "PiLabs"
        companyUrl: "https://ucr.edu"
        date: "June 2023 - August 2023"
        featuredLink:
          enable: true
          name: "View Project"
