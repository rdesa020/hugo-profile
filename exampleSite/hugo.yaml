  # About
  about:
    enable: true
    title: "About Me"

    content: |-
      Hello! I'm Riti Desai, a recent Data Science graduate from UC Riverside and an incoming AI student at University of Pennsylvania. I have a strong foundation in computer science, statistics, and software development, with a deep interest in AI systems, large language models, and building things that actually work in the real world.

      My academic journey and the work I've done across startups, research labs, and enterprise teams have shaped how I think about problems. I don't just want to use AI - I want to understand how it works under the hood, where it breaks, and how to make it better. That curiosity is what's driven me from my first Python class all the way to working on production LLM systems, multi-agent pipelines, and ML research that got published.

      Technically, I'm comfortable across Python, SQL, C++, JavaScript, and R, and I've built real experience with LLM applications, RAG systems, text embeddings, multi-agent architectures, and data pipelines. I enjoy working at the intersection of research and engineering - where you have to both think deeply and build quickly.

      Outside of work, I care a lot about building things that solve everyday problems, not just impressive-sounding demos. If something can be made smarter, faster, or more useful with AI, I want to figure out how.

      I'm always open to connecting - whether you have a question, want to collaborate, or just want to talk about something interesting happening in AI.


