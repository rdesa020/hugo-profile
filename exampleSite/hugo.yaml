        companyUrl: "https://its.ucr.edu/"
        date: "June 2025 - August 2025"

        info:
          enable: true
          content: UCR Undergrad Research Intern.

        featuredLink:
          enable: true
          name: "View Project Overview"
          url: "https://drive.google.com/file/d/18_B3-ZxMXxmekJ9j1l3IEJ1uaQijaAuC/view"

        content: |
           I built a multi-agent AI Schedule Recommender using Google ADK, RAG, and BigQuery to generate personalized class schedules across 10+ majors. I contributed to backend logic for prerequisite validation and course selection, and I assisted in designing a chat-style academic planning interface that enables students to explore and build schedules intuitively.
    
      - job: "Data Science Research Assistant"
        company: "UCR"
        companyUrl: "https://ucr.edu"
        date: "March 2025 - July 2025"

        info:
          enable: true
          content: I am working as an Undergrad Research Assistant.
        featuredLink:
          enable: true
          name: "View"
          url: "https://sigcse2026.sigcse.org/profile/ritidesai"
        content: |
           I worked on a SIGCSE 2026 publication focused on detecting AI-generated code in introductory C++ courses. Our research used a dataset of 14K+ submissions and evaluated multiple ML models, developing a Soft Voting Ensemble that achieved an F1 score of 0.995 while remaining robust under 15% noisy data.

      - job: "Data Science Intern – NLP Risk Adjustment"
        company: "Edifecs"
