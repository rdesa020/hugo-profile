          content: I am working as a technical contractor.
        content: |
           I build ML models and text embeddings to analyze 50,000+ customer interactions from movie industry marketing campaigns, identifying sentiment and behavioral drivers and boosting audience awareness from 20% to 45%. I also design dashboards adopted across 5+ industry verticals to improve insight turnaround time by 80%, and collaborate with engineers to deploy models that reduce manual reporting by 3-4 hours per analyst per week. Built an NL2SQL chatbot using OpenAI models that converts natural language questions into SQL queries, enabling non-technical users to explore databases and generate insights without writing SQL.

      - job: "AI Engineering Research Intern"
