        content: I developed a Python and HTML-based analytics tool for automated Excel visualization, built an LLM-powered chatbot using Llama 3, Ollama, and ChromaDB with a Streamlit UI to help engineers understand 11+ Edifecs products faster, and refined NLP annotators using SQL and Regex in the UIMA framework to improve evidence extraction accuracy.


      - job: "Webacy Blockchain and Web3 Security Research Extern"
        company: "Webacy"
        companyUrl: "https://www.webacy.com/"
        date: "March 2024 - April 2024"
        featuredLink:
          enable: true
